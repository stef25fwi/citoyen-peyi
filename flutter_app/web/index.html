<!DOCTYPE html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Plateforme de consultation citoyenne anonyme">
    <meta name="theme-color" content="#005098">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citoyen Peyi</title>
    <link rel="manifest" href="manifest.json">
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #005098;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              var activeScript = registration.active && registration.active.scriptURL;
              if (activeScript && activeScript.indexOf('flutter_service_worker.js') !== -1) {
                registration.unregister();
              }
            });
          }).catch(function () {});
        }
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) {
              caches.delete(key);
            });
          }).catch(function () {});
        }
      })();
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
