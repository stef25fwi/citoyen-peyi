name: citoyen_peyi_flutter
description: Port Flutter Web de l'application Citoyen Peyi.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.6.0
  crypto: ^3.0.6
  firebase_app_check: ^0.4.5
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  http: ^1.2.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  firebase_messaging: ^16.4.1
  firebase_storage: ^13.4.3
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/citoyen_peyi/
