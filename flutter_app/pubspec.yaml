name: citoyen_peyi_flutter
description: Port Flutter Web de l'application Citoyen Peyi.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.5.0
  crypto: ^3.0.6
  firebase_auth: ^5.3.1
  firebase_core: ^3.8.0
  http: ^1.2.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/fondecran.png
    - assets/images/logo.png
    - assets/images/logo1.png
    - assets/images/logo3.png
    - assets/images/lastlogo.png
