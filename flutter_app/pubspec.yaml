name: citoyen_peyi_flutter
description: Port Flutter Web de l'application Citoyen Peyi.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.7.1
  crypto: ^3.0.6
  firebase_app_check: ^0.4.5+2
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.0
  http: ^1.2.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  firebase_messaging: ^16.4.3
  firebase_storage: ^13.4.5
  image: ^4.2.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/citoyen_peyi/
    - assets/citoyen_peyi/option_icons/
