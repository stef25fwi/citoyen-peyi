version: 2
updates:
  # Backend Node.js (workspace racine npm : couvre app/backend via package-lock.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  # Tests des regles Firestore (package.json dedie)
  - package-ecosystem: npm
    directory: "/tests/firestore-rules"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      firestore-rules-tests:
        update-types:
          - minor
          - patch

  # Application Flutter / Dart
  - package-ecosystem: pub
    directory: "/flutter_app"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      flutter-minor-patch:
        update-types:
          - minor
          - patch

  # Actions GitHub (maintient checkout/setup-node/google-github-actions a jour ;
  # evite la deprecation Node 20 des runners signalee dans les logs de deploiement)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types:
          - minor
          - patch
