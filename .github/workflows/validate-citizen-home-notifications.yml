name: Validate citizen home notifications

on:
  push:
    branches:
      - feat/citizen-home-notifications-agent-activity
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/services/new_poll_badge_service.dart'
      - 'flutter_app/lib/pages/citizen/citizen_home_page.dart'
      - 'flutter_app/lib/pages/controller_profile_page.dart'
      - 'flutter_app/lib/pages/controller_dashboard_page.dart'
      - 'flutter_app/test/citizen_home_page_test.dart'
      - '.github/workflows/validate-citizen-home-notifications.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/citizen-home-notifications-agent-activity
          fetch-depth: 0

      - name: Apply deterministic Dart fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          profile = Path('flutter_app/lib/pages/controller_profile_page.dart')
          text = profile.read_text()
          text = text.replace(
              'initialIndex: widget.initialTab.clamp(0, 1),',
              'initialIndex: widget.initialTab.clamp(0, 1).toInt(),',
          )
          text = text.replace(
              'width: width.clamp(140, 280),',
              'width: width.clamp(140.0, 280.0).toDouble(),',
          )
          profile.write_text(text)

          home = Path('flutter_app/lib/pages/citizen/citizen_home_page.dart')
          text = home.read_text()
          text = text.replace(
              'height: dense ? 48 : 58,',
              'height: dense ? 46 : 60,',
          )
          text = text.replace(
              'padding: EdgeInsets.symmetric(horizontal: 14, vertical: dense ? 7 : 10),',
              'padding: EdgeInsets.symmetric(horizontal: 14, vertical: dense ? 5 : 6),',
          )
          text = text.replace(
              'fontSize: dense ? 17 : 19,\n                    fontWeight: FontWeight.w900,',
              'fontSize: dense ? 16 : 18,\n                    height: 1,\n                    fontWeight: FontWeight.w900,',
          )
          text = text.replace(
              'fontSize: 12.5,\n                      fontWeight: FontWeight.w600,',
              'fontSize: 11.5,\n                      height: 1,\n                      fontWeight: FontWeight.w600,',
              1,
          )
          home.write_text(text)
          PY

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format changed Dart files
        working-directory: flutter_app
        run: >-
          dart format
          lib/services/new_poll_badge_service.dart
          lib/pages/citizen/citizen_home_page.dart
          lib/pages/controller_profile_page.dart
          lib/pages/controller_dashboard_page.dart
          test/citizen_home_page_test.dart

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - id: citizen_home_tests
        name: Test citizen home
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test test/citizen_home_page_test.dart 2>&1 | tee ../citizen-home-test.log

      - name: Upload citizen home test diagnostic
        if: steps.citizen_home_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: citizen-home-test-diagnostic
          path: citizen-home-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after test failure
        if: steps.citizen_home_tests.outcome == 'failure'
        run: exit 1

      - name: Publish validated formatting
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app
          if git diff --cached --quiet; then
            echo 'No changes to publish.'
          else
            git commit -m 'style: valide et formate accueil notifications activité'
            git push origin HEAD:feat/citizen-home-notifications-agent-activity
          fi
