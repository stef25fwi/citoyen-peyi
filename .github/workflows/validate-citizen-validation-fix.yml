name: Validate citizen validation false error fix

on:
  push:
    branches:
      - fix/citizen-validation-false-error
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/citizen-validation-false-error
          fetch-depth: 0

      - name: Apply validation flow fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('flutter_app/lib/pages/access_citizen_page.dart')
          text = path.read_text(encoding='utf-8')

          old_constructor = """class AccessCitizenPage extends StatefulWidget {
            const AccessCitizenPage({super.key, this.initialCode});

            /// Code citoyen prerempli (issu d'un QR scanne : `/#/access?code=...`).
            final String? initialCode;
"""
          new_constructor = """class AccessCitizenPage extends StatefulWidget {
            const AccessCitizenPage({
              super.key,
              this.initialCode,
              this.voteAccessService,
              this.persistSession,
            });

            /// Code citoyen prerempli (issu d'un QR scanne : `/#/access?code=...`).
            final String? initialCode;

            /// Dépendances injectables pour tester séparément la validation et les
            /// opérations secondaires exécutées après une connexion réussie.
            final VoteAccessService? voteAccessService;
            final Future<void> Function(CitizenPublicAccessSession session)?
                persistSession;
"""

          old_method = """  Future<void> _validateCitizenCode() async {
            if (!hasAcceptedLegalTerms) {
              _showSnack(
                  'Veuillez accepter les CGU avant de valider votre code citoyen.');
              return;
            }

            final rawCode = _codeController.text.trim().toUpperCase();
            if (rawCode.isEmpty) {
              _showSnack('Veuillez saisir votre code citoyen.');
              return;
            }

            setState(() {
              _isSubmitting = true;
              _errorMessage = null;
            });

            try {
              final validation = await VoteAccessService.instance.validateCode(rawCode);
              if (!mounted) return;

              final sessionFromFirestore =
                  await CitizenPublicAccessService.instance.openAccess(rawCode);
              final session = sessionFromFirestore ??
                  CitizenPublicAccessService.instance.sessionFromValidation(
                    rawCode: rawCode,
                    validation: validation,
                  );
              if (!mounted) return;

              await CitizenPublicAccessService.instance.saveSession(session);
              await CitizenCommuneStore.instance.save(
                communeId: session.communeId,
                communeName: session.communeName,
              );
              await NewPollBadgeService.instance.startListening();
              await NewPollBadgeService.instance.markAllSeen();
              if (!mounted) return;

              unawaited(PushNotificationService.instance.registerForCitizenCommune(
                rawCode: rawCode,
                communeId: session.communeId,
                communeName: session.communeName,
              ));

              setState(() => _isSubmitting = false);

              Navigator.of(context).pushNamed(
                '/citizen/welcome',
                arguments: {'session': session},
              );
            } on VoteAccessException catch (error) {
              if (!mounted) return;
              setState(() {
                _errorMessage = error.message;
                _isSubmitting = false;
              });
            } catch (_) {
              if (!mounted) return;
              setState(() {
                _errorMessage = 'Validation indisponible. Réessayez plus tard.';
                _isSubmitting = false;
              });
            }
          }
"""

          new_method = """  Future<void> _validateCitizenCode() async {
            if (!hasAcceptedLegalTerms) {
              _showSnack(
                  'Veuillez accepter les CGU avant de valider votre code citoyen.');
              return;
            }

            final rawCode = _codeController.text.trim().toUpperCase();
            if (rawCode.isEmpty) {
              _showSnack('Veuillez saisir votre code citoyen.');
              return;
            }

            setState(() {
              _isSubmitting = true;
              _errorMessage = null;
            });

            late final VoteAccessValidationResult validation;
            try {
              validation = await (widget.voteAccessService ??
                      VoteAccessService.instance)
                  .validateCode(rawCode);
            } on VoteAccessException catch (error) {
              if (!mounted) return;
              setState(() {
                _errorMessage = error.message;
                _isSubmitting = false;
              });
              return;
            } catch (error, stackTrace) {
              debugPrint('[CitizenAccess] code validation failed: $error');
              debugPrintStack(stackTrace: stackTrace);
              if (!mounted) return;
              setState(() {
                _errorMessage = 'Validation indisponible. Réessayez plus tard.';
                _isSubmitting = false;
              });
              return;
            }

            if (!mounted) return;

            late final CitizenPublicAccessSession session;
            try {
              final sessionFromFirestore =
                  await CitizenPublicAccessService.instance.openAccess(rawCode);
              session = sessionFromFirestore ??
                  CitizenPublicAccessService.instance.sessionFromValidation(
                    rawCode: rawCode,
                    validation: validation,
                  );
            } catch (error, stackTrace) {
              debugPrint('[CitizenAccess] session creation failed: $error');
              debugPrintStack(stackTrace: stackTrace);
              if (!mounted) return;
              setState(() {
                _errorMessage =
                    'Code validé, mais l’espace citoyen n’a pas pu être ouvert.';
                _isSubmitting = false;
              });
              return;
            }

            if (!mounted) return;
            setState(() => _isSubmitting = false);

            Navigator.of(context).pushNamed(
              '/citizen/welcome',
              arguments: {'session': session},
            );

            // La validation est déjà réussie et la session est active en mémoire.
            // Les écritures locales et l’abonnement aux notifications ne doivent
            // donc jamais transformer cette réussite en faux message d’erreur.
            unawaited(_completeCitizenLogin(
              rawCode: rawCode,
              session: session,
            ));
          }

          Future<void> _completeCitizenLogin({
            required String rawCode,
            required CitizenPublicAccessSession session,
          }) async {
            await _runPostLoginStep('save session', () async {
              final persistSession = widget.persistSession;
              if (persistSession != null) {
                await persistSession(session);
              } else {
                await CitizenPublicAccessService.instance.saveSession(session);
              }
            });
            await _runPostLoginStep(
              'save commune',
              () => CitizenCommuneStore.instance.save(
                communeId: session.communeId,
                communeName: session.communeName,
              ),
            );
            await _runPostLoginStep(
              'start notification badge',
              NewPollBadgeService.instance.startListening,
            );
            await _runPostLoginStep(
              'mark notifications seen',
              NewPollBadgeService.instance.markAllSeen,
            );
            await _runPostLoginStep(
              'register push notifications',
              () => PushNotificationService.instance.registerForCitizenCommune(
                rawCode: rawCode,
                communeId: session.communeId,
                communeName: session.communeName,
              ),
            );
          }

          Future<void> _runPostLoginStep(
            String label,
            Future<void> Function() action,
          ) async {
            try {
              await action();
            } catch (error, stackTrace) {
              debugPrint('[CitizenAccess] post-login $label failed: $error');
              debugPrintStack(stackTrace: stackTrace);
            }
          }
"""

          if old_constructor in text:
              text = text.replace(old_constructor, new_constructor, 1)
          elif 'this.voteAccessService' not in text:
              raise SystemExit('AccessCitizenPage constructor pattern not found')

          if old_method in text:
              text = text.replace(old_method, new_method, 1)
          elif '_completeCitizenLogin' not in text:
              raise SystemExit('Citizen validation method pattern not found')

          path.write_text(text, encoding='utf-8')
          PY

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format changed files
        working-directory: flutter_app
        run: >-
          dart format
          lib/pages/access_citizen_page.dart
          test/access_citizen_false_error_test.dart

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Run regression test
        working-directory: flutter_app
        run: flutter test test/access_citizen_false_error_test.dart

      - name: Run citizen flow tests
        working-directory: flutter_app
        run: flutter test test/citizen_full_flow_test.dart test/widget_test.dart

      - name: Publish validated fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app
          if git diff --cached --quiet; then
            echo 'No validated changes to publish.'
          else
            git commit -m 'fix: évite le faux échec après validation citoyenne'
            git push origin HEAD:fix/citizen-validation-false-error
          fi
