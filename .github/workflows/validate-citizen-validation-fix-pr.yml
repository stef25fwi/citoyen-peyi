name: Validate citizen validation fix PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/pages/access_citizen_page.dart'
      - 'flutter_app/test/access_citizen_false_error_test.dart'
      - 'tool/apply_citizen_validation_fix.py'
      - '.github/workflows/validate-citizen-validation-fix-pr.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    if: github.head_ref == 'fix/citizen-validation-false-error' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/citizen-validation-false-error
          fetch-depth: 0

      - name: Apply validation flow fix
        run: python3 tool/apply_citizen_validation_fix.py

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format changed files
        working-directory: flutter_app
        run: >-
          dart format
          lib/pages/access_citizen_page.dart
          test/access_citizen_false_error_test.dart

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - id: regression
        name: Run regression test
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test test/access_citizen_false_error_test.dart 2>&1 | tee ../citizen-validation-test.log

      - name: Upload regression diagnostic
        if: steps.regression.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: citizen-validation-test-diagnostic
          path: citizen-validation-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after regression failure
        if: steps.regression.outcome == 'failure'
        run: exit 1

      - id: citizen_flows
        name: Run citizen flow tests
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test test/citizen_full_flow_test.dart test/widget_test.dart 2>&1 | tee ../citizen-flow-tests.log

      - name: Upload citizen flow diagnostic
        if: steps.citizen_flows.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: citizen-flow-tests-diagnostic
          path: citizen-flow-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after citizen flow failure
        if: steps.citizen_flows.outcome == 'failure'
        run: exit 1

      - name: Publish validated fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app tool/apply_citizen_validation_fix.py
          if git diff --cached --quiet; then
            echo 'No validated changes to publish.'
          else
            git commit -m 'fix: évite le faux échec après validation citoyenne'
            git push origin HEAD:fix/citizen-validation-false-error
          fi
