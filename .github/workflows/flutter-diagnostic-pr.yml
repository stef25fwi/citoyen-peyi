name: Flutter diagnostic PR

on:
  pull_request:
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-diagnostic-pr.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - id: analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > /tmp/flutter-analyze.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Comment diagnostic
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/flutter-analyze.log', 'utf8');
            const clipped = log.length > 14000 ? log.slice(-14000) : log;
            const body = `## Diagnostic Flutter analyze\n\n\`\`\`text\n${clipped}\n\`\`\`\n\nExit code: ${{ steps.analyze.outputs.status }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Fail if analyze failed
        if: steps.analyze.outputs.status != '0'
        run: exit 1
