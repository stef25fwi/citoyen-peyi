# Artifact Registry repo: europe-west1/citoyen-peyi (docker)
# NB: le secret GCP_RUNTIME_SERVICE_ACCOUNT doit pointer vers un SA existant que
# GCP_DEPLOY_SERVICE_ACCOUNT peut "actAs" (roles/iam.serviceAccountUser), sinon
# "gcloud run deploy" echoue avec PERMISSION_DENIED iam.serviceAccounts.actAs.
# Ce SA runtime doit aussi avoir roles/secretmanager.secretAccessor sur tous les
# secrets montes (SUPER_ADMIN_KEY, VOTE_ACCESS_TOKEN_SECRET, ACCESS_CODE_PEPPER,
# CITIZEN_FINGERPRINT_PEPPER + optionnels ADMIN_ACCESS_KEY/PEPPER, CONTROLLER_CODE_PEPPER).
# Les secrets sont montes en ":latest" : une rotation (nouvelle version) n'est prise
# en compte qu'au prochain deploiement (nouvelle revision).
name: Deploy backend (Cloud Run)

on:
  push:
    branches:
      - main
    paths:
      - 'app/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Backend tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --workspace app/backend
      - run: npm run test --workspace app/backend
        env:
          NODE_ENV: test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      RATE_LIMIT_REDIS_URL: ${{ vars.RATE_LIMIT_REDIS_URL }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          missing=0
          for name in GCP_PROJECT_ID GCP_REGION CORS_ORIGIN GCP_WORKLOAD_IDENTITY_PROVIDER GCP_DEPLOY_SERVICE_ACCOUNT GCP_RUNTIME_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub configuration: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Sanitize runtime service account
        run: |
          # Defense contre un secret GCP_RUNTIME_SERVICE_ACCOUNT contenant un
          # espace ou un saut de ligne parasite (copier-coller) : Cloud Run
          # rejette alors la valeur avec "Unsupported service account". On
          # retire tout caractere d'espacement avant utilisation.
          clean="$(printf '%s' "$GCP_RUNTIME_SERVICE_ACCOUNT" | tr -d '[:space:]')"
          if [ -z "$clean" ]; then
            echo "::error::GCP_RUNTIME_SERVICE_ACCOUNT est vide apres nettoyage." >&2
            exit 1
          fi
          echo "GCP_RUNTIME_SERVICE_ACCOUNT=$clean" >> "$GITHUB_ENV"

      - name: Validate required Secret Manager secrets
        run: |
          missing=0
          for secret in SUPER_ADMIN_KEY VOTE_ACCESS_TOKEN_SECRET ACCESS_CODE_PEPPER CITIZEN_FINGERPRINT_PEPPER PARTICIPATION_PEPPER; do
            if ! gcloud secrets describe "$secret" >/dev/null 2>&1; then
              echo "Missing required Secret Manager secret: $secret" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate runtime service account impersonation (actAs)
        run: |
          # Deployer un service Cloud Run avec --service-account exige que le SA
          # de deploiement puisse "actAs" le SA runtime (roles/iam.serviceAccountUser).
          # Sans ce role, "gcloud run deploy" echoue avec PERMISSION_DENIED et le
          # backend reste bloque sur une ancienne revision. On verifie tot et on
          # affiche la commande exacte de remediation.
          fix_cmd="gcloud iam service-accounts add-iam-policy-binding $GCP_RUNTIME_SERVICE_ACCOUNT --member=\"serviceAccount:$GCP_DEPLOY_SERVICE_ACCOUNT\" --role=\"roles/iam.serviceAccountUser\" --project=$GCP_PROJECT_ID"
          if ! policy="$(gcloud iam service-accounts get-iam-policy "$GCP_RUNTIME_SERVICE_ACCOUNT" --format=json 2>/dev/null)"; then
            echo "::warning::Impossible de lire la policy IAM du SA runtime (permission de lecture manquante). Le deploiement echouera si le role actAs n'est pas deja accorde. Remediation : $fix_cmd"
            exit 0
          fi
          if echo "$policy" | grep -q 'roles/iam.serviceAccountUser' && \
             echo "$policy" | grep -q "serviceAccount:$GCP_DEPLOY_SERVICE_ACCOUNT"; then
            echo "OK: le SA de deploiement peut actAs le SA runtime."
          else
            echo "::error::Le SA de deploiement n'a pas roles/iam.serviceAccountUser sur le SA runtime. 'gcloud run deploy' va echouer (PERMISSION_DENIED actAs)." >&2
            echo "Remediation :" >&2
            echo "  $fix_cmd" >&2
            exit 1
          fi

      - name: Warn if RATE_LIMIT_REDIS_URL is not configured
        run: |
          if [ -z "$RATE_LIMIT_REDIS_URL" ]; then
            echo "::warning::RATE_LIMIT_REDIS_URL absent : le backend demarrera avec un rate limiter en memoire (par instance, non partage entre instances Cloud Run). Definir la variable de depot RATE_LIMIT_REDIS_URL pour un rate limiting partage."
          fi

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe citoyen-peyi \
            --location="$GCP_REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create citoyen-peyi \
            --repository-format=docker \
            --location="$GCP_REGION" \
            --description="Citoyen Peyi backend images"

      - name: Build image
        working-directory: app/backend
        run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/citoyen-peyi/backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          # GOOGLE_CLOUD_PROJECT n'est PAS injecte automatiquement par Cloud Run.
          # isFirebaseAdminConfigured() (env.js) exige K_SERVICE + une variable projet
          # pour valider les Application Default Credentials; sans elle, validateEnv
          # leve "Firebase Admin doit etre configure" et le conteneur crashe au boot.
          ENV_VARS="^@^NODE_ENV=production@CORS_ORIGIN=$CORS_ORIGIN@LOG_LEVEL=info@GOOGLE_CLOUD_PROJECT=$GCP_PROJECT_ID"
          if [ -n "$API_BASE_URL" ]; then
            ENV_VARS="$ENV_VARS@API_BASE_URL=$API_BASE_URL"
          fi
          if [ -n "$RATE_LIMIT_REDIS_URL" ]; then
            ENV_VARS="$ENV_VARS@RATE_LIMIT_REDIS_URL=$RATE_LIMIT_REDIS_URL"
          fi

          SECRET_BINDINGS="SUPER_ADMIN_KEY=SUPER_ADMIN_KEY:latest,VOTE_ACCESS_TOKEN_SECRET=VOTE_ACCESS_TOKEN_SECRET:latest,ACCESS_CODE_PEPPER=ACCESS_CODE_PEPPER:latest,CITIZEN_FINGERPRINT_PEPPER=CITIZEN_FINGERPRINT_PEPPER:latest,PARTICIPATION_PEPPER=PARTICIPATION_PEPPER:latest"
          for optional_secret in ADMIN_ACCESS_KEY ADMIN_ACCESS_PEPPER CONTROLLER_CODE_PEPPER GEMINI_API_KEY; do
            if gcloud secrets describe "$optional_secret" >/dev/null 2>&1; then
              SECRET_BINDINGS="$SECRET_BINDINGS,$optional_secret=$optional_secret:latest"
            fi
          done

          set +e
          deploy_output="$(gcloud run deploy citoyen-peyi-backend \
            --image="$IMAGE" \
            --region="$GCP_REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --set-env-vars="$ENV_VARS" \
            --set-secrets="$SECRET_BINDINGS" \
            --min-instances=1 \
            --max-instances=5 \
            --concurrency=80 \
            --cpu=1 \
            --memory=512Mi 2>&1)"
          deploy_status=$?
          echo "$deploy_output"
          if [ "$deploy_status" -ne 0 ]; then
            if echo "$deploy_output" | grep -qi 'iam.serviceaccounts.actAs'; then
              echo "::error::Deploiement refuse : le SA de deploiement ne peut pas actAs le SA runtime. Remediation :" >&2
              echo "  gcloud iam service-accounts add-iam-policy-binding $GCP_RUNTIME_SERVICE_ACCOUNT --member=\"serviceAccount:$GCP_DEPLOY_SERVICE_ACCOUNT\" --role=\"roles/iam.serviceAccountUser\" --project=$GCP_PROJECT_ID" >&2
            fi
            exit "$deploy_status"
          fi

      - name: Report backend URL
        run: |
          SERVICE_URL="$(gcloud run services describe citoyen-peyi-backend --region="$GCP_REGION" --format='value(status.url)')"
          echo "Backend deployed: $SERVICE_URL"
          {
            echo "### Backend Cloud Run"
            echo ""
            echo "Service URL: $SERVICE_URL"
            echo ""
            echo "Set GitHub repository variable API_BASE_URL to this URL, then rerun the Pages workflow."
          } >> "$GITHUB_STEP_SUMMARY"
