name: Validate premium visual system

on:
  push:
    branches:
      - feat/premium-visual-system
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/theme/**'
      - 'flutter_app/lib/widgets/**'
      - 'flutter_app/lib/pages/**'
      - 'flutter_app/lib/main.dart'
      - 'flutter_app/pubspec.yaml'
      - 'flutter_app/test/premium_theme_test.dart'
      - 'docs/design/audit-harmonisation-premium-2026-07.md'
      - 'tool/apply_premium_font_resilience.py'
      - '.github/workflows/validate-premium-visual-system.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    if: github.event_name == 'push' || github.head_ref == 'feat/premium-visual-system' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/premium-visual-system
          fetch-depth: 0

      - name: Apply resilient premium typography
        run: python3 tool/apply_premium_font_resilience.py

      - name: Publish typography migration
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app docs/design/audit-harmonisation-premium-2026-07.md
          if git diff --cached --quiet; then
            echo 'No typography migration changes to publish.'
          else
            git commit -m 'design: rend la typographie premium disponible hors ligne'
            git push origin HEAD:feat/premium-visual-system
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format premium files
        working-directory: flutter_app
        run: >-
          dart format
          lib/main.dart
          lib/theme/app_theme.dart
          lib/theme/citizen_design_tokens.dart
          lib/theme/citoyen_theme.dart
          lib/widgets/app_responsive_viewport.dart
          lib/widgets/public_page_ui.dart
          lib/widgets/public_bottom_nav.dart
          lib/widgets/primary_participate_button.dart
          lib/widgets/citizen/citizen_header.dart
          lib/widgets/citizen/citizen_bottom_nav.dart
          lib/widgets/citizen/citizen_card.dart
          lib/widgets/citizen/citizen_primary_button.dart
          lib/pages/home_page.dart
          lib/pages/access_citizen_page.dart
          lib/pages/admin_login_page.dart
          lib/pages/controller_login_page.dart
          lib/pages/super_admin_login_page.dart
          test/premium_theme_test.dart

      - id: analyze
        name: Analyze Flutter application
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee ../premium-analyze.log

      - name: Upload analyze diagnostic
        if: steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: premium-analyze-diagnostic
          path: premium-analyze.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after analyze failure
        if: steps.analyze.outcome == 'failure'
        run: exit 1

      - id: premium_tests
        name: Test premium design system
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test test/premium_theme_test.dart 2>&1 | tee ../premium-theme-test.log

      - name: Upload premium test diagnostic
        if: steps.premium_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: premium-theme-test-diagnostic
          path: premium-theme-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after premium test failure
        if: steps.premium_tests.outcome == 'failure'
        run: exit 1

      - id: responsive_tests
        name: Test shared responsive pages
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test \
            test/app_responsive_viewport_test.dart \
            test/public_page_ui_test.dart \
            test/citizen_home_page_test.dart \
            2>&1 | tee ../premium-responsive-test.log

      - name: Upload responsive test diagnostic
        if: steps.responsive_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: premium-responsive-test-diagnostic
          path: premium-responsive-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after responsive test failure
        if: steps.responsive_tests.outcome == 'failure'
        run: exit 1

      - name: Publish formatting changes
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app docs/design/audit-harmonisation-premium-2026-07.md
          if git diff --cached --quiet; then
            echo 'No formatting changes to publish.'
          else
            git commit -m 'style: formate le design system premium'
            git push origin HEAD:feat/premium-visual-system
          fi
