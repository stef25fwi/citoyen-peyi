name: Validate public pages

on:
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/pages/public_news_page.dart'
      - 'flutter_app/lib/pages/public_vote_page.dart'
      - 'flutter_app/lib/pages/public_results_page.dart'
      - 'flutter_app/lib/widgets/public_page_ui.dart'
      - 'flutter_app/test/public_page_ui_test.dart'
      - '.github/workflows/validate-public-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    if: github.head_ref == 'fix/uniformise-public-pages'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/uniformise-public-pages
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - working-directory: flutter_app
        run: flutter pub get
      - name: Verify formatting
        working-directory: flutter_app
        run: dart format --output=none --set-exit-if-changed lib/pages/public_news_page.dart lib/pages/public_vote_page.dart lib/pages/public_results_page.dart lib/widgets/public_page_ui.dart test/public_page_ui_test.dart
      - working-directory: flutter_app
        run: flutter analyze
      - name: Run shared public UI test
        working-directory: flutter_app
        run: flutter test test/public_page_ui_test.dart
      - id: full_tests
        name: Run full Flutter suite and capture diagnostic
        working-directory: flutter_app
        run: |
          set +e
          flutter test > ../docs/public-pages-test-diagnostic.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "Flutter test exit status: $status"
          exit 0
      - name: Publish failing test diagnostic
        if: steps.full_tests.outputs.status != '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/public-pages-test-diagnostic.txt
          git commit -m 'test: publie le diagnostic Flutter des pages publiques'
          git push origin HEAD:fix/uniformise-public-pages
      - name: Fail when full suite failed
        if: always() && steps.full_tests.outputs.status != '0'
        run: exit 1
