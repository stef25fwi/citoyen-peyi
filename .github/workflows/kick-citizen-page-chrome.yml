name: Kick citizen page chrome

on:
  push:
    paths:
      - '.github/workflows/kick-citizen-page-chrome.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run embedded patch script
        run: |
          awk '
            /python3 - <<'"'"'PY'"'"'/ { capture = 1; next }
            capture && /^          PY$/ { capture = 0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-citizen-page-chrome.yml | python3

      - name: Commit generated changes
        run: |
          git diff --check
          if git diff --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flutter_app/lib/pages/public_news_page.dart \
            flutter_app/lib/pages/citizen/citizen_consultations_page.dart \
            flutter_app/lib/pages/public_results_page.dart
          git commit -m 'style: harmonise les pages citoyennes et la barre système'
          git push
