name: Validate citizen home reference

on:
  push:
    branches:
      - feat/citizen-home-reference-pixel-perfect
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/pages/citizen/citizen_home_page.dart'
      - 'flutter_app/lib/widgets/citizen/citizen_bottom_nav.dart'
      - 'flutter_app/assets/citoyen_peyi/cp_home_*.svg'
      - 'flutter_app/test/citizen_home_page_test.dart'
      - 'tool/fix_citizen_home_reference_layout.py'
      - '.github/workflows/validate-citizen-home-reference.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/citizen-home-reference-pixel-perfect
          fetch-depth: 0

      - name: Apply reference layout corrections
        run: python3 tool/fix_citizen_home_reference_layout.py

      - name: Publish layout corrections
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app/lib/pages/citizen/citizen_home_page.dart
          if git diff --cached --quiet; then
            echo 'No layout corrections to publish.'
          else
            git commit -m 'fix: supprime les débordements de l’accueil citoyen'
            git push origin HEAD:feat/citizen-home-reference-pixel-perfect
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format changed Dart files
        working-directory: flutter_app
        run: >-
          dart format
          lib/pages/citizen/citizen_home_page.dart
          lib/widgets/citizen/citizen_bottom_nav.dart
          test/citizen_home_page_test.dart

      - name: Analyze Flutter application
        working-directory: flutter_app
        run: flutter analyze

      - id: home_tests
        name: Test citizen home reference
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter test test/citizen_home_page_test.dart 2>&1 | tee ../citizen-home-test.log

      - name: Upload citizen home test diagnostic
        if: steps.home_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: citizen-home-test-diagnostic
          path: citizen-home-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after citizen home test failure
        if: steps.home_tests.outcome == 'failure'
        run: exit 1

      - name: Test connected citizen pages
        working-directory: flutter_app
        run: >-
          flutter test
          test/app_responsive_viewport_test.dart
          test/public_page_ui_test.dart

      - name: Build web release
        working-directory: flutter_app
        run: flutter build web --release

      - name: Publish formatting changes
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app/lib/pages/citizen/citizen_home_page.dart \
            flutter_app/lib/widgets/citizen/citizen_bottom_nav.dart \
            flutter_app/test/citizen_home_page_test.dart
          if git diff --cached --quiet; then
            echo 'No formatting changes to publish.'
          else
            git commit -m 'style: formate l’accueil citoyen de référence'
            git push origin HEAD:feat/citizen-home-reference-pixel-perfect
          fi
