name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/backend/package-lock.json
      - run: npm install
      - run: npm test
        env:
          NODE_ENV: test

  flutter:
    name: Flutter (analyze, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  firestore-rules:
    name: Firestore rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install firebase-tools
        run: npm install -g firebase-tools@13
      - name: Install rules test deps
        working-directory: tests/firestore-rules
        run: npm install
      - name: Run rules unit tests against emulator
        working-directory: tests/firestore-rules
        run: firebase emulators:exec --only firestore --project demo-citoyen-peyi "npm test"
