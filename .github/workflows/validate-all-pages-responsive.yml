name: Validate all pages responsive

on:
  push:
    branches:
      - feat/all-pages-full-responsive
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/lib/**'
      - 'flutter_app/test/app_responsive_viewport_test.dart'
      - 'flutter_app/test/citizen_home_page_test.dart'
      - 'tool/apply_all_pages_responsive.py'
      - '.github/workflows/validate-all-pages-responsive.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    if: github.event_name == 'push' || github.head_ref == 'feat/all-pages-full-responsive'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/all-pages-full-responsive
          fetch-depth: 0

      - name: Apply responsive migration
        run: python3 tool/apply_all_pages_responsive.py

      - name: Publish responsive source migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app/lib/pages tool/apply_all_pages_responsive.py
          if git diff --cached --quiet; then
            echo 'No source migration changes to publish.'
          else
            git commit -m 'fix: applique les adaptations responsive à toutes les pages'
            git push origin HEAD:feat/all-pages-full-responsive
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Format responsive files
        working-directory: flutter_app
        run: >-
          dart format
          lib/app.dart
          lib/widgets/app_responsive_viewport.dart
          lib/widgets/citizen/citizen_header.dart
          lib/widgets/citizen/citizen_bottom_nav.dart
          lib/pages/home_page.dart
          lib/pages/access_citizen_page.dart
          lib/pages/legal_page.dart
          lib/pages/citizen/citizen_home_page.dart
          lib/pages/citizen/citizen_consultations_page.dart
          lib/pages/citizen/citizen_poll_question_page.dart
          lib/pages/citizen/citizen_profile_page.dart
          test/app_responsive_viewport_test.dart
          test/citizen_home_page_test.dart

      - id: analyze
        name: Analyze Flutter application
        continue-on-error: true
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee ../responsive-analyze.log

      - name: Publish analyze diagnostic
        if: steps.analyze.outcome == 'failure'
        run: |
          mkdir -p .github/diagnostics
          cp responsive-analyze.log .github/diagnostics/responsive-analyze.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/diagnostics/responsive-analyze.log
          git commit -m 'ci: publie le diagnostic responsive Flutter'
          git push origin HEAD:feat/all-pages-full-responsive

      - name: Stop after analyze failure
        if: steps.analyze.outcome == 'failure'
        run: exit 1

      - name: Test responsive framework
        working-directory: flutter_app
        run: flutter test test/app_responsive_viewport_test.dart

      - name: Test citizen responsive screens
        working-directory: flutter_app
        run: flutter test test/citizen_home_page_test.dart test/public_page_ui_test.dart

      - name: Publish formatting changes
        if: success()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flutter_app
          if git diff --cached --quiet; then
            echo 'No formatting changes to publish.'
          else
            git commit -m 'style: formate la migration responsive globale'
            git push origin HEAD:feat/all-pages-full-responsive
          fi
