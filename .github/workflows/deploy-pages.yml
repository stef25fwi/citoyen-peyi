name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://citoyen-peyi-backend-up6de3cljq-ew.a.run.app' }}
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve and validate API_BASE_URL
        run: |
          clean="$(printf '%s' "$API_BASE_URL" | tr -d '\r\n')"
          case "$clean" in
            https://*) ;;
            *)
              echo "API_BASE_URL HTTPS est requis pour le build GitHub Pages." >&2
              exit 1
              ;;
          esac
          echo "API_BASE_URL=$clean" >> "$GITHUB_ENV"
          echo "Backend compile: $clean"

      - name: Build site
        env:
          RECAPTCHA_SITE_KEY: ${{ vars.RECAPTCHA_SITE_KEY }}
        run: >-
          flutter build web --release --base-href "/${GITHUB_REPOSITORY#*/}/"
          --dart-define=API_BASE_URL=$API_BASE_URL
          --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          --dart-define=PUSH_VAPID_KEY=${{ vars.PUSH_VAPID_KEY }}
          ${RECAPTCHA_SITE_KEY:+--dart-define=RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY}

      - name: Verify compiled backend URL
        run: |
          if ! grep -Fq "$API_BASE_URL" build/web/main.dart.js; then
            echo "L'URL backend n'est pas presente dans l'artefact Flutter compile." >&2
            exit 1
          fi
          if grep -Fq "http://localhost:4000" build/web/main.dart.js; then
            echo "Le build de production contient encore une reference localhost." >&2
            exit 1
          fi

      - name: Add SPA fallback
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
