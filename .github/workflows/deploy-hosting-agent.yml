name: Agent deploy hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'firebase.json'
      - '.github/workflows/deploy-hosting-agent.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-hosting-agent-main
  cancel-in-progress: true

jobs:
  deploy-hosting:
    name: Build Flutter web and deploy Hosting
    runs-on: ubuntu-latest
    environment: production
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://citoyen-peyi-backend-up6de3cljq-ew.a.run.app' }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Flutter analyze diagnostic
        working-directory: flutter_app
        continue-on-error: true
        run: flutter analyze

      - name: Validate production variables
        run: |
          clean_api="$(printf '%s' "$API_BASE_URL" | tr -d '\r\n')"
          clean_project="$(printf '%s' "$FIREBASE_PROJECT_ID" | tr -d '\r\n')"
          if [[ -z "$clean_project" ]]; then
            echo "FIREBASE_PROJECT_ID manquant dans les variables GitHub." >&2
            exit 1
          fi
          case "$clean_api" in
            https://*) ;;
            *)
              echo "API_BASE_URL HTTPS est requis pour le build de production." >&2
              exit 1
              ;;
          esac
          echo "API_BASE_URL=$clean_api" >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$clean_project" >> "$GITHUB_ENV"

      - name: Build Flutter web release
        working-directory: flutter_app
        run: >-
          flutter build web
          --release
          --pwa-strategy=none
          --base-href /
          --dart-define=API_BASE_URL=$API_BASE_URL
          --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          --dart-define=PUSH_VAPID_KEY=${{ vars.PUSH_VAPID_KEY }}

      - name: Verify compiled backend URL
        working-directory: flutter_app
        run: |
          if ! grep -Fq "$API_BASE_URL" build/web/main.dart.js; then
            echo "L'URL backend n'est pas presente dans l'artefact Flutter compile." >&2
            exit 1
          fi
          if grep -Fq "http://localhost:4000" build/web/main.dart.js; then
            echo "Le build de production contient encore localhost." >&2
            exit 1
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13 --quiet

      - name: Deploy Firebase Hosting
        run: >-
          firebase deploy
          --only hosting
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deployment summary
        run: |
          echo "### Agent deploy hosting terminé" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build Flutter Web: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- Firebase Hosting: $FIREBASE_PROJECT_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend compile: $API_BASE_URL" >> "$GITHUB_STEP_SUMMARY"
