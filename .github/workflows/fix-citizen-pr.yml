name: Fix citizen PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/citizen-flow-ui-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/citizen-flow-ui-final
          fetch-depth: 0

      - name: Apply targeted fixes
        run: |
          echo 'Corrections delegated to the base-branch autofix workflow.'
