name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/workflows/deploy-firebase-hosting.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL }}
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Validate API_BASE_URL
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Repository variable API_BASE_URL est requis." >&2
            exit 1
          fi

      - name: Build Flutter web
        run: >-
          flutter build web
          --release
          --pwa-strategy=none
          --base-href /
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          --dart-define=PUSH_VAPID_KEY=${{ vars.PUSH_VAPID_KEY }}

      - name: Install firebase-tools
        working-directory: .
        run: npm install -g firebase-tools@13 --quiet

      - name: Deploy to Firebase Hosting
        working-directory: .
        run: |
          firebase deploy \
            --only hosting,firestore:rules,firestore:indexes,storage \
            --project ${{ vars.FIREBASE_PROJECT_ID }} \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Summary
        run: |
          echo "### Firebase Hosting deploye" >> "$GITHUB_STEP_SUMMARY"
          echo "- https://citoyen-peyi.web.app" >> "$GITHUB_STEP_SUMMARY"
