name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - 'firebase.ghpages.json'
      - '.github/workflows/deploy-firebase-hosting.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    if: ${{ vars.FIREBASE_PROJECT_ID != '' || true }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build for Firebase Hosting (base-href /)
        run: >-
          flutter build web --release --base-href /
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        working-directory: .
        run: npx --yes firebase-tools@13 deploy --config firebase.ghpages.json --only hosting --project citoyen-peyi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
