name: Apply results header once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-results-header-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Harmonise results page header
        run: |
          python3 - <<'PY'
          from pathlib import Path

          page = Path('flutter_app/lib/pages/public_results_page.dart')
          text = page.read_text(encoding='utf-8')

          import_line = "import '../widgets/citizen/citizen_bottom_nav.dart';\n"
          header_import = "import '../widgets/citizen/citizen_header.dart';\n"
          if header_import not in text:
              if import_line not in text:
                  raise SystemExit('Citizen bottom nav import not found')
              text = text.replace(import_line, import_line + header_import, 1)

          old_widget = "              const _ResultsHeader(),"
          new_widget = """              const CitizenHeader(
                title: 'Résultats des consultations',
                height: 92,
                trailing: DebugLogButton(label: ''),
              ),"""
          if old_widget not in text and new_widget not in text:
              raise SystemExit('Results header widget call not found')
          text = text.replace(old_widget, new_widget, 1)

          start_marker = 'class _ResultsHeader extends StatelessWidget {'
          end_marker = 'class _ResultsIntro extends StatelessWidget {'
          if start_marker in text:
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              text = text[:start] + text[end:]

          page.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-results-header-once.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit the UI correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flutter_app/lib/pages/public_results_page.dart .github/workflows/apply-results-header-once.yml
          git diff --cached --check
          git commit -m "fix: harmonise le header de la page résultats"
          git push origin main
